<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AI 美学测评</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #f9f7ff;
            -webkit-font-smoothing: antialiased;
        }
        input[type="file"] {
            display: none;
        }
        .glass-card {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            box-shadow: 0 10px 25px -5px rgba(139, 92, 246, 0.1), 0 8px 10px -6px rgba(139, 92, 246, 0.1);
        }
        .btn-primary {
            background: linear-gradient(135deg, #9333ea 0%, #7c3aed 100%);
            transition: all 0.3s ease;
        }
        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px -5px rgba(124, 58, 237, 0.4);
        }
        .loader {
            border-top-color: #7c3aed;
            animation: spinner 0.6s linear infinite;
        }
        @keyframes spinner {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        .fade-in {
            animation: fadeIn 0.5s ease-in;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        /* 修复点击区域冲突 */
        .upload-area {
            position: relative;
            cursor: pointer;
        }
        .analyze-btn-container {
            position: absolute;
            bottom: -60px;
            left: 50%;
            transform: translateX(-50%);
            width: calc(100% - 48px);
            z-index: 10;
        }
    </style>
</head>
<body class="min-h-screen flex flex-col items-center justify-center p-4">

    <div class="w-full max-w-md">
        <!-- Header -->
        <div class="text-center mb-8">
            <h1 class="text-2xl font-bold text-gray-800 flex items-center justify-center gap-2">
                <i class="fas fa-magic text-purple-600"></i> AI 美学测评
            </h1>
            <p class="text-gray-500 mt-2 text-sm">上传一张正脸照，解锁你的专属变美方案
        </div>

        <!-- Main Card -->
        <div class="glass-card rounded-3xl p-6 relative overflow-hidden">
            
            <!-- Upload Area -->
            <div id="uploadArea" class="upload-area border-2 border-dashed border-purple-300 rounded-2xl py-12 flex flex-col items-center justify-center text-center cursor-pointer bg-purple-50/50 transition-colors hover:border-purple-500">
                <input type="file" id="fileInput" accept="image/*">
                
                <!-- Icon Placeholder -->
                <div id="iconPlaceholder" class="w-20 h-20 bg-purple-100 rounded-full flex items-center justify-center mb-4 text-purple-400 text-4xl">
                    <i class="fas fa-cloud-upload-alt"></i>
                </div>

                <!-- Preview Image -->
                <img id="previewImage" class="w-full h-48 object-cover rounded-xl hidden mb-4">
                
                <!-- Text -->
                <p id="uploadText" class="text-gray-600 font-medium">点击或拖拽图片到此处
                <p class="text-xs text-gray-400 mt-1">支持 JPG, PNG 格式 (建议小于 5MB)

                <!-- Remove Button -->
                <button id="removeBtn" class="absolute top-3 right-3 bg-white/80 backdrop-blur-sm rounded-full w-6 h-6 flex items-center justify-center text-gray-400 hover:text-red-500 hidden">
                    <i class="fas fa-times text-xs"></i>
                </button>
            </div>

            <!-- Analyze Button Container (Fixed Position) -->
            <div class="analyze-btn-container">
                <button id="analyzeBtn" class="btn-primary w-full py-4 rounded-2xl text-white font-bold text-lg shadow-lg opacity-50 cursor-not-allowed" disabled>
                    <i class="fas fa-search mr-2"></i> 开始美学分析
                </button>
            </div>

        </div>

        <!-- Footer -->
        <p class="text-center text-gray-400 text-xs mt-8">
            分析结果仅供娱乐参考，自信才是最美的滤镜
        
    </div>

    <!-- Loading Modal -->
    <div id="loadingModal" class="fixed inset-0 bg-black/60 backdrop-blur-sm flex flex-col items-center justify-center z-50 hidden">
        <div class="bg-white rounded-2xl p-8 w-4/5 max-w-sm text-center shadow-2xl">
            <div class="loader w-12 h-12 border-4 border-gray-200 rounded-full mx-auto mb-4"></div>
            <h3 class="text-lg font-semibold text-gray-800 mb-2">AI 正在分析中</h3>
            <p id="loadingText" class="text-gray-500 text-sm">正在识别面部特征，请稍候...
            <div class="mt-4 w-full bg-gray-100 rounded-full h-1.5">
                <div class="bg-purple-600 h-1.5 rounded-full" style="width: 0%" id="progressBar"></div>
            </div>
        </div>
    </div>

    <!-- Result Card -->
    <div id="resultCard" class="fixed inset-0 bg-black/60 backdrop-blur-sm flex items-center justify-center z-50 hidden p-4">
        <div class="bg-white rounded-3xl w-full max-w-md max-h-[90vh] overflow-y-auto fade-in">
            <div class="p-6">
                <div class="flex justify-between items-start mb-4">
                    <h2 class="text-xl font-bold text-gray-800 flex items-center gap-2">
                        <i class="fas fa-palette text-purple-600"></i> 美学分析报告
                    </h2>
                    <button onclick="closeResult()" class="text-gray-400 hover:text-gray-600">
                        <i class="fas fa-times"></i>
                    </button>
                </div>

                <div id="resultContent" class="space-y-4 text-gray-700">
                    <!-- Content will be injected here -->
                </div>
            </div>
        </div>
    </div>

    <script>
        // DOM Elements
        const fileInput = document.getElementById('fileInput');
        const uploadArea = document.getElementById('uploadArea');
        const previewImage = document.getElementById('previewImage');
        const analyzeBtn = document.getElementById('analyzeBtn');
        const removeBtn = document.getElementById('removeBtn');
        const iconPlaceholder = document.getElementById('iconPlaceholder');
        const uploadText = document.getElementById('uploadText');
        const loadingModal = document.getElementById('loadingModal');
        const resultCard = document.getElementById('resultCard');
        const resultContent = document.getElementById('resultContent');

        let currentFile = null;

        // Event Listeners
        uploadArea.addEventListener('click', () => fileInput.click());
        fileInput.addEventListener('change', handleFileSelect);
        analyzeBtn.addEventListener('click', handleAnalyze);
        removeBtn.addEventListener('click', resetUI);

        // Drag and Drop
        uploadArea.addEventListener('dragover', (e) => {
            e.preventDefault();
            uploadArea.classList.add('border-purple-500', 'bg-purple-100/70');
        });
        uploadArea.addEventListener('dragleave', () => {
            uploadArea.classList.remove('border-purple-500', 'bg-purple-100/70');
        });
        uploadArea.addEventListener('drop', (e) => {
            e.preventDefault();
            uploadArea.classList.remove('border-purple-500', 'bg-purple-100/70');
            if (e.dataTransfer.files.length) {
                handleFile(e.dataTransfer.files[0]);
            }
        });

        function handleFileSelect(e) {
            if (e.target.files.length) {
                handleFile(e.target.files[0]);
            }
        }

        function handleFile(file) {
            // Validate file type
            if (!file.type.startsWith('image/')) {
                alert('请上传图片文件！');
                return;
            }
            // Validate file size (max 5MB)
            if (file.size > 5 * 1024 * 1024) {
                alert('图片过大，请上传小于 5MB 的图片');
                return;
            }

            currentFile = file;
            
            const reader = new FileReader();
            reader.onload = (e) => {
                previewImage.src = e.target.result;
                previewImage.classList.remove('hidden');
                iconPlaceholder.classList.add('hidden');
                uploadText.classList.add('hidden');
                removeBtn.classList.remove('hidden');
                
                // Enable button
                analyzeBtn.disabled = false;
                analyzeBtn.classList.remove('opacity-50', 'cursor-not-allowed');
            };
            reader.readAsDataURL(file);
        }

        function resetUI() {
            fileInput.value = '';
            previewImage.classList.add('hidden');
            iconPlaceholder.classList.remove('hidden');
            uploadText.classList.remove('hidden');
            removeBtn.classList.add('hidden');
            
            analyzeBtn.disabled = true;
            analyzeBtn.classList.add('opacity-50', 'cursor-not-allowed');
            currentFile = null;
        }

        async function handleAnalyze() {
            if (!currentFile) return;

            // UI Updates
            loadingModal.classList.remove('hidden');
            analyzeBtn.disabled = true;
            
            // Progress simulation
            let progress = 0;
            const interval = setInterval(() => {
                progress += 10;
                document.getElementById('progressBar').style.width = `${progress}%`;
                if (progress >= 90) clearInterval(interval);
            }, 200);

            try {
                // 🔥 关键修复：使用 FormData 包装文件
                const formData = new FormData();
                formData.append('image', currentFile); // 这里的 'image' 必须和后端 api/analyze.js 里接收的名字一致

                const response = await fetch('/api/analyze', {
                    method: 'POST',
                    body: formData, // 直接发送 formData，不要手动设置 Content-Type！
                });

                clearInterval(interval);
                document.getElementById('progressBar').style.width = `100%`;
                
                if (!response.ok) {
                    const errData = await response.json();
                    throw new Error(errData.error || `请求失败: ${response.status}`);
                }

                const data = await response.json();
                showResult(data);

            } catch (error) {
                console.error('分析失败:', error);
                alert('分析失败: ' + error.message);
            } finally {
                setTimeout(() => loadingModal.classList.add('hidden'), 500);
            }
        }

        function showResult(data) {
            const f = data.features || {};
            const advice = data.advice || '暂无建议';

            resultContent.innerHTML = `
                <div class="flex items-center gap-4 mb-6">
                    <div class="w-16 h-16 bg-purple-100 rounded-full flex items-center justify-center text-3xl">✨</div>
                    <div>
                        <h3 class="text-xl font-bold">${f.shape || '未知'} · ${f.age || '--'}岁</h3>
                        <p class="text-sm text-gray-500">${f.gender || '未知'} · ${f.type || '未知'}
                    </div>
                    <div class="ml-auto bg-purple-100 text-purple-700 px-4 py-2 rounded-full font-bold">
                        ${f.beauty || '0'}分
                    </div>
                </div>
                <div class="bg-purple-50 p-4 rounded-xl">
                    <h4 class="font-semibold text-purple-800 mb-2">💄 变美建议</h4>
                    <p class="text-sm text-gray-700 whitespace-pre-wrap">${advice}
                </div>
            `;
            
            resultCard.classList.remove('hidden');
            loadingModal.classList.add('hidden');
        }

        function closeResult() {
            resultCard.classList.add('hidden');
            resetUI(); // Reset to allow new upload
        }
    </script>
</body>
</html>
