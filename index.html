<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI 美学测评</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body { font-family: 'Inter', sans-serif; background: #f3f4f6; }
    .gradient-text { background: linear-gradient(90deg, #a855f7, #ec4899); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
    .card-shadow { box-shadow: 0 20px 25px -5px rgba(0,0,0,0.1); }
    .loader { border-top-color: #a855f7; animation: spin 1s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4">
  <div class="w-full max-w-md">
    <div class="text-center mb-8">
      <h1 class="text-3xl font-bold gradient-text"><i class="fas fa-magic mr-2"></i>AI 美学测评</h1>
      <p class="text-gray-600">上传正脸照，解锁专属变美方案</p>
    </div>
    <div id="uploadCard" class="bg-white rounded-2xl p-8 card-shadow">
      <div id="dropArea" class="border-2 border-dashed border-gray-300 rounded-xl p-8 text-center cursor-pointer hover:border-purple-500">
        <input type="file" id="fileInput" class="hidden" accept="image/*">
        <div class="w-16 h-16 bg-purple-100 rounded-full flex items-center justify-center mx-auto"><i class="fas fa-cloud-upload-alt text-3xl text-purple-600"></i></div>
        <p class="font-medium text-gray-700 mt-4">点击上传或拖拽照片</p>
      </div>
      <img id="preview" class="w-full h-64 object-cover rounded-lg mt-6 hidden">
    </div>
    <div id="spinner" class="hidden fixed inset-0 bg-black/20 flex items-center justify-center">
      <div class="bg-white p-8 rounded-2xl"><div class="loader w-12 h-12 border-4 rounded-full mx-auto"></div><p class="text-gray-700 mt-4">AI 分析中...</p></div>
    </div>
    <div id="resultCard" class="hidden mt-8 bg-white rounded-2xl p-8 card-shadow"></div>
  </div>
  <script>
    const TOKEN = new URLSearchParams(location.search).get('t');
    if (!TOKEN) document.body.innerHTML = '<div class="error">非法访问</div>';

    const dropArea = document.getElementById('dropArea');
    const fileInput = document.getElementById('fileInput');
    const spinner = document.getElementById('spinner');
    const resultCard = document.getElementById('resultCard');

    dropArea.onclick = () => fileInput.click();
    fileInput.onchange = e => {
      const file = e.target.files[0];
      const reader = new FileReader();
      reader.onload = ev => {
        document.getElementById('preview').src = ev.target.result;
        document.getElementById('preview').classList.remove('hidden');
        analyzeImage(ev.target.result.split(',')[1]);
      };
      reader.readAsDataURL(file);
    };

    async function analyzeImage(base64) {
      spinner.style.display = 'flex';
      try {
        const res = await fetch('/api/analyze', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ imageBase64: base64, token: TOKEN })
        });
        const data = await res.json();
        spinner.style.display = 'none';
        if (data.error) return alert(data.error);
        
        resultCard.innerHTML = `
          <h2 class="text-xl font-bold">${data.features.shape}脸 · ${data.features.age}岁</h2>
          <p class="text-purple-600 font-bold my-2">颜值评分：${data.features.beauty}分</p>
          <div class="prose">${data.advice.replace(/\n/g, '<br>')}</div>
          <button onclick="location.reload()" class="mt-4 w-full py-2 bg-purple-600 text-white rounded-lg">重新测评</button>
        `;
        resultCard.style.display = 'block';
      } catch (e) {
        spinner.style.display = 'none';
        alert('网络错误，请重试');
      }
    }
  </script>
</body>
</html>
