<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI 美学测评</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f9fafb; }
        .upload-area { border: 2px dashed #d1d5db; transition: all 0.3s; }
        .upload-area:hover { border-color: #8b5cf6; background-color: #faf5ff; }
        .upload-area.dragover { border-color: #8b5cf6; background-color: #f3e8ff; }
        .btn-primary { background: linear-gradient(135deg, #a855f7 0%, #ec4899 100%); }
        .btn-primary:hover { opacity: 0.9; transform: translateY(-1px); }
        .spinner { border-top-color: #8b5cf6; animation: spin 1s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }
        .modal-enter { opacity: 0; transform: scale(0.95); }
        .modal-enter-active { opacity: 1; transform: scale(1); transition: all 300ms; }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4">

    <div class="container max-w-md mx-auto bg-white rounded-2xl shadow-xl overflow-hidden">
        <!-- Header -->
        <div class="p-6 text-center border-b border-gray-100">
            <h1 class="text-2xl font-bold text-gray-800 mb-2">
                <i class="fas fa-magic mr-2 text-purple-500"></i>AI 美学测评
            </h1>
            <p class="text-gray-600 text-sm">上传一张正脸照，解锁你的专属变美方案</p>
        </div>

        <!-- Main Content -->
        <div class="p-6">
            <!-- Upload Area -->
            <div id="uploadArea" class="upload-area rounded-xl p-8 text-center cursor-pointer mb-6">
                <input type="file" id="fileInput" class="hidden" accept="image/*">
                <div id="placeholder" class="space-y-4">
                    <div class="w-16 h-16 bg-purple-100 rounded-full flex items-center justify-center mx-auto">
                        <i class="fas fa-cloud-upload-alt text-3xl text-purple-500"></i>
                    </div>
                    <div>
                        <p class="text-gray-700 font-medium">点击或拖拽照片到此处</p>
                        <p class="text-sm text-gray-400 mt-1">支持 JPG、PNG 格式，大小不超过 5MB</p>
                    </div>
                </div>

                <!-- Preview -->
                <div id="previewContainer" class="hidden space-y-4">
                    <div class="relative">
                        <img id="preview" class="w-full h-48 object-cover rounded-lg shadow-md" alt="Preview">
                        <button id="removeBtn" class="absolute -top-2 -right-2 w-6 h-6 bg-red-500 text-white rounded-full flex items-center justify-center text-xs hover:bg-red-600">
                            <i class="fas fa-times"></i>
                        </button>
                    </div>
                    <button id="analyzeBtn" class="w-full py-3 btn-primary text-white rounded-xl font-medium shadow-lg hover:shadow-xl transition-all">
                        <i class="fas fa-search mr-2"></i>开始美学分析
                    </button>
                </div>
            </div>

            <!-- Tips -->
            <div class="bg-blue-50 rounded-lg p-4 text-sm text-blue-700">
                <i class="fas fa-lightbulb mr-2"></i>
                <span>分析结果仅供娱乐参考，自信才是最美的滤镜 ✨</span>
            </div>
        </div>
    </div>

    <!-- Loading Modal -->
    <div id="loadingModal" class="fixed inset-0 bg-black/50 flex items-center justify-center z-50 hidden">
        <div class="bg-white rounded-2xl p-8 max-w-sm w-full mx-4 text-center modal-enter">
            <div class="spinner w-12 h-12 rounded-full border-4 mx-auto mb-4"></div>
            <h3 class="text-lg font-semibold text-gray-800 mb-2">AI 正在分析中</h3>
            <p id="loadingText" class="text-gray-500 text-sm">正在为您排队，请稍候...</p>
            <div class="mt-4 w-full bg-gray-200 rounded-full h-2">
                <div id="progressBar" class="bg-purple-500 h-2 rounded-full transition-all duration-300" style="width: 0%"></div>
            </div>
        </div>
    </div>

    <!-- Result Card -->
    <div id="resultCard" class="fixed inset-0 bg-black/50 flex items-center justify-center z-50 hidden p-4">
        <div class="bg-white rounded-2xl max-w-2xl w-full max-h-[90vh] overflow-y-auto shadow-2xl modal-enter">
            <div class="p-6">
                <div class="flex justify-between items-start mb-6">
                    <h2 class="text-xl font-bold text-gray-800">
                        <i class="fas fa-star text-yellow-400 mr-2"></i>你的美学报告
                    </h2>
                    <button onclick="closeResult()" class="text-gray-400 hover:text-gray-600">
                        <i class="fas fa-times text-xl"></i>
                    </button>
                </div>
                
                <div id="resultContent">
                    <!-- Result will be injected here -->
                </div>
            </div>
        </div>
    </div>

    <script>
        // DOM Elements
        const uploadArea = document.getElementById('uploadArea');
        const fileInput = document.getElementById('fileInput');
        const previewContainer = document.getElementById('previewContainer');
        const preview = document.getElementById('preview');
        const placeholder = document.getElementById('placeholder');
        const analyzeBtn = document.getElementById('analyzeBtn');
        const removeBtn = document.getElementById('removeBtn');
        const loadingModal = document.getElementById('loadingModal');
        const loadingText = document.getElementById('loadingText');
        const progressBar = document.getElementById('progressBar');
        const resultCard = document.getElementById('resultCard');
        const resultContent = document.getElementById('resultContent');

        let selectedFile = null;

        // Event Listeners
        uploadArea.addEventListener('click', () => fileInput.click());
        uploadArea.addEventListener('dragover', (e) => {
            e.preventDefault();
            uploadArea.classList.add('dragover');
        });
        uploadArea.addEventListener('dragleave', () => {
            uploadArea.classList.remove('dragover');
        });
        uploadArea.addEventListener('drop', (e) => {
            e.preventDefault();
            uploadArea.classList.remove('dragover');
            const files = e.dataTransfer.files;
            if (files.length > 0) handleFile(files[0]);
        });

        fileInput.addEventListener('change', (e) => {
            if (e.target.files.length > 0) handleFile(e.target.files[0]);
        });

        removeBtn.addEventListener('click', removeImage);
        analyzeBtn.addEventListener('click', analyzeFace);

        // Handle File Selection
        function handleFile(file) {
            if (!file.type.startsWith('image/')) {
                alert('请上传图片文件！');
                return;
            }
            if (file.size > 5 * 1024 * 1024) {
                alert('图片大小不能超过 5MB！');
                return;
            }

            selectedFile = file;
            const reader = new FileReader();
            
            reader.onload = (e) => {
                preview.src = e.target.result;
                placeholder.classList.add('hidden');
                previewContainer.classList.remove('hidden');
            };
            
            reader.readAsDataURL(file);
        }

        // Remove Image
        function removeImage() {
            selectedFile = null;
            preview.src = '';
            placeholder.classList.remove('hidden');
            previewContainer.classList.add('hidden');
            fileInput.value = '';
        }

        // Analyze Face
        async function analyzeFace() {
            if (!selectedFile) return;

            // Show loading with animation
            loadingModal.classList.remove('hidden');
            loadingText.textContent = 'AI 正在为您排队...';
            progressBar.style.width = '20%';

            // 🔥 关键修复：使用 FormData 标准格式
            const formData = new FormData();
            formData.append('image', selectedFile); // 字段名必须与后端一致

            try {
                // Simulate progress
                let progress = 20;
                const interval = setInterval(() => {
                    progress += 10;
                    if (progress <= 80) {
                        progressBar.style.width = progress + '%';
                        if (progress === 40) loadingText.textContent = '正在提取面部特征...';
                        if (progress === 60) loadingText.textContent = '正在分析五官比例...';
                    }
                }, 500);

                // 🔥 关键修复：不要设置 Content-Type，让浏览器自动处理
                const response = await fetch('/api/analyze-face', {
                    method: 'POST',
                    body: formData
                    // 注意：这里不手动设置 headers，浏览器会自动设置 multipart/form-data 和 boundary
                });

                clearInterval(interval);
                progressBar.style.width = '100%';
                loadingText.textContent = '分析完成！';

                setTimeout(async () => {
                    loadingModal.classList.add('hidden');
                    
                    if (!response.ok) {
                        const errorData = await response.json();
                        throw new Error(errorData.error || '分析失败，请重试');
                    }

                    const data = await response.json();
                    displayResult(data);
                }, 500);

            } catch (error) {
                console.error('Analysis Error:', error);
                loadingModal.classList.add('hidden');
                
                // 更友好的错误提示
                let errorMessage = error.message || '未知错误';
                
                // 针对特定错误码提供更具体的提示
                if (errorMessage.includes('繁忙') || errorMessage.includes('timeout')) {
                    errorMessage = 'AI 服务器繁忙，请稍后再试';
                } else if (errorMessage.includes('格式错误') || errorMessage.includes('format')) {
                    errorMessage = '图片格式不支持，请上传 JPG/PNG';
                }
                
                showError(errorMessage);
            }
        }

        // Display Result
        function displayResult(data) {
            // 安全检查：防止 data 结构异常导致页面崩溃
            const features = data.features || {};
            const shape = features.shape || '未知';
            const age = features.age || '--';
            const beauty = features.beauty || '0';
            const gender = features.gender || '未知';
            const advice = data.advice || '暂无建议';

            resultContent.innerHTML = `
                <div class="result-header flex items-center gap-4 mb-6">
                    <div class="avatar w-16 h-16 bg-purple-100 rounded-full flex items-center justify-center text-3xl">💄</div>
                    <div class="info">
                        <h2 class="text-xl font-bold">${shape}脸 · ${age}岁 · ${gender}</h2>
                        <p class="text-sm text-gray-500">基于面部黄金比例分析</p>
                    </div>
                    <div class="score-badge ml-auto bg-purple-100 text-purple-700 px-4 py-2 rounded-full font-bold text-lg">
                        ${beauty}分
                    </div>
                </div>
                
                <div class="section-title text-lg font-semibold text-purple-700 mb-4 pl-3 border-l-4 border-purple-500">
                    💡 专属变美建议
                </div>
                <div class="advice-content text-gray-700 leading-relaxed whitespace-pre-wrap">
                    ${advice}
                </div>
                
                <button class="mt-6 w-full py-3 bg-purple-600 text-white rounded-xl font-medium" onclick="location.reload()">
                    <i class="fas fa-redo mr-2"></i> 重新测评
                </button>
            `;
            
            resultCard.classList.remove('hidden');
        }

        // Show Error
        function showError(message) {
            // 移除旧的错误提示
            const oldError = document.getElementById('tempError');
            if (oldError) oldError.remove();

            const errorDiv = document.createElement('div');
            errorDiv.id = 'tempError';
            errorDiv.className = 'fixed top-4 left-1/2 transform -translate-x-1/2 bg-red-500 text-white px-6 py-3 rounded-full shadow-lg flex items-center gap-2 z-50 animate-bounce';
            errorDiv.innerHTML = `<i class="fas fa-exclamation-circle"></i> ${message}`;
            document.body.appendChild(errorDiv);

            setTimeout(() => {
                errorDiv.remove();
            }, 3000);
        }

        // Close Result
        function closeResult() {
            resultCard.classList.add('hidden');
        }

        // Close modals on outside click
        loadingModal.addEventListener('click', (e) => {
            if (e.target === loadingModal) loadingModal.classList.add('hidden');
        });
        
        resultCard.addEventListener('click', (e) => {
            if (e.target === resultCard) closeResult();
        });
    </script>
</body>
</html>
