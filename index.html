<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI 美学测评</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f3f4f6; }
        .gradient-text { background: linear-gradient(90deg, #a855f7, #ec4899); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .card-shadow { box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1), 0 10px 10px -5px rgba(0, 0, 0, 0.04); }
        .loader {
            border-top-color: #a855f7;
            animation: spinner 0.6s linear infinite;
        }
        @keyframes spinner {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        .error-box {
            background: #fff;
            border-radius: 1rem;
            padding: 2rem;
            text-align: center;
            color: #dc2626;
            border: 1px solid #fecaca;
        }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4">

    <div class="w-full max-w-md">
        <!-- 头部 -->
        <div class="text-center mb-8">
            <h1 class="text-3xl font-bold gradient-text mb-2">
                <i class="fas fa-magic mr-2"></i>AI 美学测评
            </h1>
            <p class="text-gray-600">上传一张正脸照，解锁你的专属变美方案</p>
        </div>

        <!-- 主卡片 -->
        <div id="uploadCard" class="bg-white rounded-2xl p-8 card-shadow transition-all">
            <div class="border-2 border-dashed border-gray-300 rounded-xl p-8 text-center cursor-pointer hover:border-purple-500 transition-colors" id="dropArea">
                <input type="file" id="fileInput" class="hidden" accept="image/*">
                <div class="space-y-4">
                    <div class="w-16 h-16 bg-purple-100 rounded-full flex items-center justify-center mx-auto">
                        <i class="fas fa-cloud-upload-alt text-3xl text-purple-600"></i>
                    </div>
                    <div>
                        <p class="font-medium text-gray-700">点击上传或拖拽照片到此处</p>
                        <p class="text-sm text-gray-500 mt-1">支持 JPG、PNG 格式，大小不超过 5MB</p>
                    </div>
                </div>
            </div>
            <div id="previewContainer" class="mt-6 hidden">
                <img id="imagePreview" class="w-full h-64 object-cover rounded-lg border" alt="预览">
                <p class="text-xs text-gray-500 mt-2 text-center">AI 识别中，请稍候...</p>
            </div>
        </div>

        <!-- 加载动画 -->
        <div id="spinner" class="hidden fixed inset-0 bg-black/20 flex items-center justify-center z-50">
            <div class="bg-white p-8 rounded-2xl card-shadow text-center">
                <div class="loader w-12 h-12 border-4 rounded-full mx-auto mb-4"></div>
                <p id="statusText" class="text-gray-700 font-medium">AI 正在分析中...</p>
            </div>
        </div>

        <!-- 结果卡片 -->
        <div id="resultCard" class="bg-white rounded-2xl p-8 card-shadow hidden mt-8">
            <!-- 结果内容由 JS 动态生成 -->
        </div>

        <!-- 底部提示 -->
        <div class="text-center mt-6">
            <p class="text-xs text-gray-400">分析结果仅供娱乐参考，自信才是最美的滤镜</p>
        </div>
    </div>

    <script>
        // 配置
        const API_URL = '/api/analyze';
        const MAX_RETRY = 2; // 最大重试次数

        // DOM 元素
        const dropArea = document.getElementById('dropArea');
        const fileInput = document.getElementById('fileInput');
        const uploadCard = document.getElementById('uploadCard');
        const previewContainer = document.getElementById('previewContainer');
        const imagePreview = document.getElementById('imagePreview');
        const spinner = document.getElementById('spinner');
        const statusText = document.getElementById('statusText');
        const resultCard = document.getElementById('resultCard');

        // 从 URL 获取 Token（修复非法访问）
        const params = new URLSearchParams(window.location.search);
        const TOKEN = params.get('t');
        if (!TOKEN) {
            document.body.innerHTML = '<div class="error-box">⚠️ 非法访问<br>请从订单获取专属链接</div>';
            throw new Error("No token");
        }

        // 初始化事件监听
        dropArea.addEventListener('click', () => fileInput.click());
        
        // 拖拽功能
        ['dragenter', 'dragover', 'dragleave', 'drop'].forEach(eventName => {
            dropArea.addEventListener(eventName, preventDefaults, false);
        });
        function preventDefaults(e) { e.preventDefault(); e.stopPropagation(); }
        ['dragenter', 'dragover'].forEach(eventName => {
            dropArea.addEventListener(eventName, highlight, false);
        });
        ['dragleave', 'drop'].forEach(eventName => {
            dropArea.addEventListener(eventName, unhighlight, false);
        });
        function highlight() { dropArea.classList.add('border-purple-500', 'bg-purple-50'); }
        function unhighlight() { dropArea.classList.remove('border-purple-500', 'bg-purple-50'); }
        dropArea.addEventListener('drop', handleDrop, false);

        function handleDrop(e) {
            const dt = e.dataTransfer;
            const files = dt.files;
            if (files.length) handleFiles(files[0]);
        }

        fileInput.addEventListener('change', function() {
            if (this.files && this.files[0]) handleFiles(this.files[0]);
        });

        // 处理文件上传
        async function handleFiles(file) {
            if (!file.type.startsWith('image/')) {
                alert('请上传图片文件！');
                return;
            }
            if (file.size > 5 * 1024 * 1024) {
                alert('图片大小不能超过 5MB！');
                return;
            }

            const reader = new FileReader();
            reader.onload = async (e) => {
                imagePreview.src = e.target.result;
                uploadCard.style.display = 'none';
                previewContainer.classList.remove('hidden');
                
                // 开始分析（带重试）
                await analyzeImage(e.target.result, 0);
            };
            reader.readAsDataURL(file);
        }

        // 核心分析逻辑（带重试和防崩溃）
        async function analyzeImage(base64Image, retryCount) {
            spinner.style.display = 'flex';
            statusText.innerText = 'AI 正在为你定制方案...';

            try {
                const res = await fetch(API_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ imageBase64: base64Image, token: TOKEN })
                });

                const data = await res.json();

                // 情况1：接口返回了明确的错误信息
                if (data.error) {
                    throw new Error(data.error);
                }

                // 情况2：防御性编程，防止 data 是 null 或 undefined
                if (!data || !data.features) {
                    throw new Error('AI 未返回有效数据');
                }

                spinner.style.display = 'none';
                displayResult(data);

            } catch (err) {
                console.error('AI Analysis Error:', err);
                
                // 重试逻辑
                if (retryCount < MAX_RETRY) {
                    statusText.innerText = `AI 服务繁忙，正在为您排队重试 (${retryCount + 1}/${MAX_RETRY})，请稍候...`;
                    await new Promise(r => setTimeout(r, 2000)); // 等待2秒
                    analyzeImage(base64Image, retryCount + 1); // 递归重试
                } else {
                    // 重试耗尽，显示友好错误
                    spinner.style.display = 'none';
                    resultCard.innerHTML = `
                        <div class="error-box">
                            <i class="fas fa-exclamation-triangle text-4xl mb-4"></i>
                            <h3 class="text-lg font-bold mb-2">哎呀，出了点小状况</h3>
                            ${err.message || 'AI 服务暂时不可用，请稍后再试'}
                            <button class="mt-4 px-4 py-2 bg-purple-600 text-white rounded-lg" onclick="location.reload()">
                                重新上传
                            </button>
                        </div>
                    `;
                    resultCard.style.display = 'block';
                }
            }
        }

        // 渲染结果（使用可选链 ?. 防止空指针）
        function displayResult(data) {
            // 使用可选链 ?. 确保即使后端返回的数据结构不完整，也不会报错
            const features = data.features || {};
            const advice = data.advice || '暂无建议';
            
            // 安全提取数据
            const shape = features.shape || '未知';
            const age = features.age || '--';
            const beauty = features.beauty || '0';
            const gender = features.gender || '未知';

            resultCard.innerHTML = `
                <div class="result-header flex items-center gap-4 mb-6">
                    <div class="avatar w-16 h-16 bg-purple-100 rounded-full flex items-center justify-center text-3xl">💄</div>
                    <div class="info">
                        <h2 class="text-xl font-bold">${shape}脸 · ${age}岁 · ${gender}</h2>
                        <p class="text-sm text-gray-500">基于面部黄金比例分析</p>
                    </div>
                    <div class="score-badge ml-auto bg-purple-100 text-purple-700 px-4 py-2 rounded-full font-bold text-lg">
                        ${beauty}分
                    </div>
                </div>
                <div class="section-title text-lg font-semibold text-purple-700 mb-4 pl-3 border-l-4 border-purple-500">
                    💡 专属变美建议
                </div>
                <div class="advice-content text-gray-700 leading-relaxed whitespace-pre-wrap">
                    ${advice}
                </div>
                <button class="mt-6 w-full py-3 bg-purple-600 text-white rounded-xl font-medium" onclick="location.reload()">
                    <i class="fas fa-redo mr-2"></i> 重新测评
                </button>
            `;
            resultCard.style.display = 'block';
        }
    </script>
</body>
</html>
