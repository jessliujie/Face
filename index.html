<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI 美学测评</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, sans-serif; background: linear-gradient(135deg, #f5f7fa 0%, #e4e8f0 100%); min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 1rem; }
        .glass-card { background: rgba(255,255,255,0.95); backdrop-filter: blur(10px); border-radius: 24px; box-shadow: 0 20px 60px -15px rgba(0,0,0,0.1); width: 100%; max-width: 420px; padding: 24px; }
        .upload-area { border: 2px dashed #d1d5db; border-radius: 16px; padding: 40px 20px; text-align: center; cursor: pointer; transition: all 0.3s; background: #f9fafb; }
        .upload-area:hover { border-color: #8b5cf6; background: #f5f3ff; }
        .btn-primary { background: linear-gradient(135deg, #8b5cf6 0%, #a855f7 100%); color: white; border: none; border-radius: 16px; padding: 16px; font-size: 17px; font-weight: 600; width: 100%; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 8px; margin-top: 20px; transition: all 0.3s; }
        .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 10px 20px -5px rgba(139,92,246,0.4); }
        .btn-primary:disabled { opacity: 0.5; cursor: not-allowed; transform: none; box-shadow: none; }
        .spinner { width: 40px; height: 40px; border: 4px solid #e5e7eb; border-top-color: #8b5cf6; border-radius: 50%; animation: spin 1s linear infinite; margin: auto; }
        @keyframes spin { to { transform: rotate(360deg); } }
        .modal { position: fixed; inset: 0; background: rgba(0,0,0,0.5); display: flex; align-items: center; justify-content: center; z-index: 1000; padding: 1rem; }
        .modal-content { background: white; border-radius: 24px; width: 100%; max-width: 420px; max-height: 85vh; overflow-y: auto; padding: 24px; }
        .hidden { display: none !important; }
        .error-toast { position: fixed; top: 20px; left: 50%; transform: translateX(-50%); background: #ef4444; color: white; padding: 12px 24px; border-radius: 8px; z-index: 2000; animation: slideIn 0.3s ease-out; }
        @keyframes slideIn { from { top: -50px; opacity: 0; } to { top: 20px; opacity: 1; } }
    </style>
</head>
<body>

    <div class="glass-card">
        <div class="text-center mb-6">
            <h1 class="text-2xl font-bold text-gray-800 flex items-center justify-center gap-2">
                <i class="fas fa-magic text-purple-600"></i> AI 美学测评
            </h1>
            <p class="text-gray-500 text-sm mt-1">上传正脸照，获取专属变美方案</p>
        </div>

        <div id="uploadArea" class="upload-area">
            <input type="file" id="fileInput" class="hidden" accept="image/jpeg,image/png,image/jpg">
            <div id="placeholder">
                <div class="w-16 h-16 bg-purple-100 rounded-full flex items-center justify-center mx-auto mb-4">
                    <i class="fas fa-cloud-upload-alt text-2xl text-purple-500"></i>
                </div>
                <p class="text-gray-700 font-medium">点击或拖拽上传照片</p>
                <p class="text-xs text-gray-400 mt-1">支持 JPG/PNG，小于 5MB</p>
            </div>
            <img id="preview" class="w-full h-48 object-cover rounded-lg hidden" alt="Preview">
        </div>

        <button id="analyzeBtn" class="btn-primary" disabled>
            <i class="fas fa-search"></i> 开始美学分析
        </button>
    </div>

    <div id="loadingModal" class="modal hidden">
        <div class="modal-content text-center">
            <div class="spinner"></div>
            <h3 class="text-lg font-semibold mt-4">AI 正在分析中</h3>
            <p id="loadingText" class="text-gray-500 text-sm mt-2">正在识别面部特征...</p>
            <div class="w-full bg-gray-200 rounded-full h-2 mt-4">
                <div id="progressBar" class="bg-purple-600 h-2 rounded-full transition-all duration-300" style="width: 0%"></div>
            </div>
        </div>
    </div>

    <div id="resultModal" class="modal hidden">
        <div class="modal-content">
            <div class="flex justify-between items-center mb-4">
                <h2 class="text-xl font-bold flex items-center gap-2">
                    <i class="fas fa-star text-yellow-400"></i> 美学分析报告
                </h2>
                <button onclick="closeResult()" class="text-gray-400 hover:text-gray-600">
                    <i class="fas fa-times"></i>
                </button>
            </div>
            <div id="resultContent"></div>
        </div>
    </div>

    <div id="errorToast" class="error-toast hidden"></div>

    <script>
        const fileInput = document.getElementById('fileInput');
        const uploadArea = document.getElementById('uploadArea');
        const preview = document.getElementById('preview');
        const placeholder = document.getElementById('placeholder');
        const analyzeBtn = document.getElementById('analyzeBtn');
        const loadingModal = document.getElementById('loadingModal');
        const loadingText = document.getElementById('loadingText');
        const progressBar = document.getElementById('progressBar');
        const errorToast = document.getElementById('errorToast');

        let selectedFile = null;

        uploadArea.addEventListener('click', (e) => {
            if (e.target.closest('.btn-primary')) return;
            fileInput.click();
        });

        fileInput.addEventListener('change', (e) => {
            if (e.target.files.length) handleFile(e.target.files[0]);
        });

        uploadArea.addEventListener('dragover', (e) => {
            e.preventDefault();
            uploadArea.classList.add('border-purple-500', 'bg-purple-50');
        });
        uploadArea.addEventListener('dragleave', () => {
            uploadArea.classList.remove('border-purple-500', 'bg-purple-50');
        });
        uploadArea.addEventListener('drop', (e) => {
            e.preventDefault();
            uploadArea.classList.remove('border-purple-500', 'bg-purple-50');
            if (e.dataTransfer.files.length) handleFile(e.dataTransfer.files[0]);
        });

        function handleFile(file) {
            if (!file.type.startsWith('image/')) {
                showError('请上传图片文件（JPG/PNG）');
                return;
            }
            if (file.size > 5 * 1024 * 1024) {
                showError('图片大小不能超过 5MB');
                return;
            }

            selectedFile = file;
            const reader = new FileReader();
            reader.onload = (e) => {
                preview.src = e.target.result;
                preview.classList.remove('hidden');
                placeholder.classList.add('hidden');
                analyzeBtn.disabled = false;
            };
            reader.readAsDataURL(file);
        }

        analyzeBtn.addEventListener('click', async () => {
            if (!selectedFile) return;

            loadingModal.classList.remove('hidden');
            analyzeBtn.disabled = true;
            progressBar.style.width = '0%';
            loadingText.textContent = '正在上传图片...';

            try {
                const formData = new FormData();
                formData.append('image', selectedFile); // 字段名必须为 'image'

                const response = await fetch('/api/analyze-face', {
                    method: 'POST',
                    body: formData
                    // ⚠️ 不要手动设置 Content-Type！
                });

                if (!response.ok) {
                    const err = await response.json();
                    throw new Error(err.error || `服务器错误 (${response.status})`);
                }

                const data = await response.json();
                if (!data.success) throw new Error(data.error || '分析失败');

                showResult(data);

            } catch (error) {
                console.error('分析失败:', error);
                showError(error.message);
            } finally {
                setTimeout(() => {
                    loadingModal.classList.add('hidden');
                    analyzeBtn.disabled = false;
                }, 500);
            }
        });

        function showResult(data) {
            const f = data.features || {};
            const advice = data.advice || '暂无建议';

            document.getElementById('resultContent').innerHTML = `
                <div class="flex items-center gap-4 mb-6">
                    <div class="w-16 h-16 bg-purple-100 rounded-full flex items-center justify-center text-3xl">✨</div>
                    <div>
                        <h3 class="text-lg font-bold">${f.shape || '未知'}脸 · ${f.age || '--'}岁</h3>
                        <p class="text-sm text-gray-500">${f.gender || '未知'} · 颜值评分</p>
                    </div>
                    <div class="ml-auto bg-purple-100 text-purple-700 px-4 py-2 rounded-full font-bold text-lg">
                        ${f.beauty || '0'}分
                    </div>
                </div>
                <div class="bg-purple-50 p-4 rounded-xl">
                    <h4 class="font-semibold text-purple-800 mb-2">💄 专属变美建议</h4>
                    <p class="text-sm text-gray-700 whitespace-pre-wrap">${advice}</p>
                </div>
                <button onclick="closeResult()" class="mt-6 w-full py-3 bg-gray-100 text-gray-700 rounded-xl font-medium">
                    关闭报告
                </button>
            `;
            
            resultModal.classList.remove('hidden');
        }

        function showError(message) {
            errorToast.textContent = message;
            errorToast.classList.remove('hidden');
            setTimeout(() => errorToast.classList.add('hidden'), 3000);
        }

        function closeResult() {
            resultModal.classList.add('hidden');
            preview.classList.add('hidden');
            placeholder.classList.remove('hidden');
            analyzeBtn.disabled = true;
            selectedFile = null;
            fileInput.value = '';
        }
    </script>
</body>
</html>
