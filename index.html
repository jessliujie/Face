<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI 社交磁场测算</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/compressorjs@1.2.1/dist/compressor.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    
    <style>
        body { 
            font-family: 'Inter', 'Noto Sans SC', sans-serif; 
            background: #0f172a; 
            color: #f8fafc; 
        }
        .glass { 
            background: rgba(30, 41, 59, 0.7); 
            backdrop-filter: blur(12px); 
            border: 1px solid rgba(255,255,255,0.08); 
            border-radius: 1rem;
            padding: 1.5rem;
            margin: 1rem 0;
        }
        .whitespace-pre-line { white-space: pre-line; }
        
        #radarChart {
            background: rgba(15, 23, 42, 0.5);
            border-radius: 0.75rem;
            padding: 0.5rem;
        }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4">
    <div class="max-w-md w-full mx-auto">
        
        <!-- 错误/无效提示 -->
        <div id="error-section" class="hidden glass rounded-2xl p-8 text-center">
            <h2 class="text-xl font-bold text-red-400 mb-3" id="error-title">🔗 链接已失效</h2>
            <p id="error-msg" class="text-gray-400 text-sm"></p>
        </div>

        <!-- 上传区 -->
        <div id="upload-section" class="glass rounded-2xl p-8 text-center">
            <h1 class="text-2xl font-bold mb-2">AI 社交磁场测算</h1>
            <p class="text-sm text-gray-400 mb-6">你的五官，自带怎样的社交结界？</p>
            <label class="cursor-pointer bg-indigo-600 text-white px-6 py-3 rounded-lg hover:bg-indigo-700 transition inline-block font-medium">
                上传原相机正面照
                <input type="file" id="imageInput" accept="image/*" class="hidden">
            </label>
        </div>

        <!-- Loading -->
        <div id="loading-section" class="hidden glass rounded-2xl p-8 text-center">
            <div class="animate-spin h-8 w-8 border-2 border-indigo-500 border-t-transparent rounded-full mx-auto mb-4"></div>
            <p class="text-gray-300 text-sm">正在解析面部几何与社交磁场...</p>
        </div>

        <!-- 结果区 -->
        <div id="result-section" class="hidden space-y-6">
            <div class="glass rounded-2xl p-6 text-center">
                <h2 id="res-archetype" class="text-2xl font-bold text-indigo-400 mb-4"></h2>
                <div style="height: 250px;">
                    <canvas id="radarChart"></canvas>
                </div>
            </div>
            <div class="glass rounded-2xl p-6">
                <h3 class="font-bold mb-3 text-indigo-300">🔮 磁场深度解析</h3>
                <p id="res-analysis" class="text-sm text-gray-300 leading-relaxed whitespace-pre-line"></p>
            </div>
            <div class="glass rounded-2xl p-6">
                <h3 class="font-bold mb-3 text-indigo-300">💡 专属破局建议</h3>
                <p id="res-advice" class="text-sm text-gray-300 leading-relaxed whitespace-pre-line"></p>
            </div>
            <button id="save-btn" class="w-full bg-indigo-600 text-white py-3 rounded-xl font-bold hover:bg-indigo-700 transition">
                📥 生成我的社交磁场名片
            </button>
        </div>
    </div>

    <!-- 隐藏的高清海报容器 -->
    <div id="poster-card" style="position: fixed; left: -9999px; top: 0; width: 375px; min-height: 600px; background: linear-gradient(160deg, #0f172a 0%, #1e1b4b 100%); padding: 40px 30px; font-family: 'Noto Sans SC', sans-serif; color: #f8fafc;">
        <h2 style="font-size: 24px; font-weight: 800; color: #818cf8; margin-bottom: 8px;">AI 社交磁场名片</h2>
        <p id="poster-date" style="font-size: 12px; color: #94a3b8; margin-bottom: 30px;"></p>
        <p id="poster-archetype" style="font-size: 28px; font-weight: bold; margin-bottom: 30px; line-height: 1.3;"></p>
        <div style="margin-bottom: 30px;">
            <p style="font-size: 14px; color: #94a3b8; margin-bottom: 15px; font-weight: bold;">📊 磁场维度雷达</p>
            <div id="poster-bars" style="display: flex; flex-direction: column; gap: 12px;"></div>
        </div>
        <div style="background: rgba(255,255,255,0.05); padding: 20px; border-radius: 12px; margin-bottom: 30px;">
            <p style="font-size: 12px; color: #818cf8; margin-bottom: 8px; font-weight: bold;">🔮 核心洞察</p>
            <p id="poster-text" style="font-size: 14px; color: #e2e8f0; line-height: 1.6; margin: 0;"></p>
        </div>
        <div style="text-align: center; border-top: 1px dashed #334155; padding-top: 20px;">
            <p style="font-size: 13px; color: #cbd5e1; font-weight: bold;">测一测你的社交结界</p>
            <p style="font-size: 11px; color: #64748b; margin-top: 5px;">小红书搜索：AI美学实验室</p>
        </div>
    </div>

    <!-- 保存弹窗 -->
    <div id="poster-modal" class="hidden fixed inset-0 bg-black bg-opacity-95 z-50 flex items-center justify-center p-6">
        <div class="relative max-w-sm w-full flex flex-col items-center">
            <img id="poster-image" src="" class="w-full rounded-xl shadow-2xl" />
            <p class="text-white text-center mt-6 text-sm animate-pulse">👆 请长按上方图片保存到相册</p>
            <button onclick="document.getElementById('poster-modal').classList.add('hidden')" class="mt-6 text-gray-400 text-sm underline">关闭</button>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
